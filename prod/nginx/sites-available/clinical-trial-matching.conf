# Clinical Trial Matching — clinicaltrialsfinder.org
server {
    listen 80;
    server_name clinicaltrialsfinder.org www.clinicaltrialsfinder.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name clinicaltrialsfinder.org www.clinicaltrialsfinder.org;

    ssl_certificate /etc/letsencrypt/live/clinicaltrialsfinder.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinicaltrialsfinder.org/privkey.pem;

    limit_req zone=general burst=20 nodelay;

    location / {
        proxy_pass http://clinical-trial-matching:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
