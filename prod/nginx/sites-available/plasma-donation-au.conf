# Plasma Finder AU — plasmafinder.com.au
server {
    listen 80;
    server_name plasmafinder.com.au www.plasmafinder.com.au;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name plasmafinder.com.au www.plasmafinder.com.au;

    ssl_certificate /etc/letsencrypt/live/plasmafinder.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plasmafinder.com.au/privkey.pem;

    limit_req zone=general burst=20 nodelay;

    location / {
        proxy_pass http://plasma-donation-au:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
