# Cilium Helm values for k3s homelab
# Install: helm install cilium cilium/cilium --namespace kube-system -f values.yaml
#
# Prerequisites:
#   1. Install k3s WITHOUT flannel: --flannel-backend=none --disable-network-policy
#   2. helm repo add cilium https://helm.cilium.io/

# eBPF-based kube-proxy replacement
kubeProxyReplacement: true
k8sServiceHost: 192.168.1.100
k8sServicePort: 6443

# Hubble observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# Operator settings
operator:
  replicas: 1

# Use eBPF host routing for performance
bpf:
  masquerade: true

# Enable bandwidth manager
bandwidthManager:
  enabled: true
