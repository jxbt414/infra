apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag-redis
  labels:
    app: wallabag-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag-redis
  template:
    metadata:
      labels:
        app: wallabag-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: wallabag-redis
spec:
  selector:
    app: wallabag-redis
  ports:
    - port: 6379
      targetPort: 6379
