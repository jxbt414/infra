apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  labels:
    app: wallabag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
    spec:
      containers:
        - name: wallabag
          image: wallabag/wallabag:latest
          ports:
            - containerPort: 80
          env:
            - name: SYMFONY__ENV__DATABASE_DRIVER
              value: pdo_pgsql
            - name: SYMFONY__ENV__DATABASE_HOST
              value: postgres
            - name: SYMFONY__ENV__DATABASE_PORT
              value: "5432"
            - name: SYMFONY__ENV__DATABASE_NAME
              value: wallabag
            - name: SYMFONY__ENV__DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: wallabag-secrets
                  key: DB_USER
            - name: SYMFONY__ENV__DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-secrets
                  key: DB_PASSWORD
            - name: SYMFONY__ENV__DOMAIN_NAME
              value: http://wallabag.local
            - name: SYMFONY__ENV__SERVER_NAME
              value: Wallabag
            - name: SYMFONY__ENV__REDIS_HOST
              value: wallabag-redis
          volumeMounts:
            - name: wallabag-images
              mountPath: /var/www/wallabag/web/assets/images
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: wallabag-images
          persistentVolumeClaim:
            claimName: wallabag-images
